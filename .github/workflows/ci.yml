name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2026-06-25
          components: rustfmt, clippy
          override: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update && \
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y clang llvm libelf-dev linux-tools-common linux-tools-generic

      - name: Generate eBPF prebuilt objects (if BTF available)
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bash scripts/build-ebpf-objects.sh || echo "eBPF build script failed — using committed prebuilt objects"
          fi
          echo "Prebuilt objects:"
          ls -la crates/kernel-companion/prebuilt-bpf/

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Build release binary
        run: cargo build --release

      - name: Verify prebuilt objects present
        run: |
          echo "BPF objects in prebuilt-bpf/:"
          ls -la crates/kernel-companion/prebuilt-bpf/
          echo "BPF objects in target/bpf/:"
          ls -la crates/kernel-companion/target/bpf/ 2>/dev/null || echo "(none — runtime generation not available)"

  security-audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2026-06-25
          override: true

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
