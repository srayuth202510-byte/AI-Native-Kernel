name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Cache Cargo registry and binaries
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Install clang for eBPF compilation
      - name: Install clang & llvm
        run: sudo apt-get update && sudo apt-get install -y clang llvm libelf-dev

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Build release binary
        run: cargo build --release



      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit (security scan)
        run: cargo audit
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: Run cargo vet (supply-chain audit)
        run: cargo vet
