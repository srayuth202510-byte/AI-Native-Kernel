# AI-Native Kernel — Grafana Tempo Datasource (for OTel traces)
apiVersion: 1
datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      httpMethod: GET
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: ank-kernel-companion
      serviceMap:
        datasourceUid: prometheus
