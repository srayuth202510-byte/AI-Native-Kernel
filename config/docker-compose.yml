# AI-Native Kernel — Monitoring Stack
# Run: docker compose -f config/docker-compose.yml up -d
# Requires ank-companion running on host with metrics_server_addr=0.0.0.0:9090
# and otel_endpoint set for trace export.
#
# Services:
#   prometheus   : scrapes ank-companion /metrics endpoint
#   tempo        : receives OTLP traces from ank-companion
#   grafana      : pre-configured with Prometheus + Tempo datasources + dashboard
#
# Access:
#   Grafana  : http://localhost:3000  (admin/admin)
#   Prometheus: http://localhost:9090
#   Tempo    : http://localhost:3200

version: "3.9"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ank-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tempo:
    image: grafana/tempo:latest
    container_name: ank-tempo
    ports:
      - "3200:3200"   # tempo query
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ank-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo

volumes:
  prometheus_data:
  tempo_data:
  grafana_data:
