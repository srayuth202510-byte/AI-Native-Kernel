# AI-Native Kernel — Tempo Configuration
# Receives OTLP traces from ank-companion (when otel_endpoint is configured)
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
