# =============================================================================
# AI-Native Kernel — Default Configuration
# =============================================================================
# This file defines all configurable parameters for the AI-Native Kernel
# companion daemon. Values are overridden by CLI args and environment variables
# (ANK_* prefix).

[general]
log_level = "info"

[kernel_companion]
uds_socket_path = "/tmp/ank-companion.sock"
intent_bus_capacity = 1024
monitoring_channel_capacity = 1024
metrics_server_addr = "127.0.0.1:9090"

[retry_telemetry]
retry_max_attempts = 3
retry_initial_backoff_ms = 100
retry_backoff_multiplier = 2.0
retry_max_backoff_ms = 10000
retry_timeout_ms = 5000
retry_use_jitter = true
metric_cache_ttl_ms = 300000
timeout_ms = 5000
use_jitter = true
metric_cache_ttl_ms = 300000
timeout_ms = 5000
use_jitter = true
timeout_ms = 5000
use_jitter = true
metric_cache_ttl_ms = 300000
timeout_ms = 5000
use_jitter = true
metric_cache_ttl_ms = 300000
timeout_ms = 5000
use_jitter = true
telemetry_snapshot_ttl_ms = 60000
audit_log_ttl_ms = 86400000
intent_metadata_ttl_ms = 300000
cleanup_interval_ms = 60000
include_timestamps = true
auto_cleanup = true

[agent_scheduler]
max_agents = 100
max_restart_attempts = 3
supervisor_interval_ms = 100
next_agent_id_start = 1
distributed_enabled = false
local_node_id = "node-local"
remote_overload_threshold_percent = 80
min_remote_trust_score = 70
max_remote_candidates = 3

[context_memory]
hot_capacity = 256
warm_capacity = 1024
p2p_enabled = false
p2p_listen_addr = "127.0.0.1:9091"
p2p_bootstrap_nodes = []
warm_store_path = "/tmp/ank-warm-store"

[compute_scheduler]
default_mode = "throughput"
adaptive_alpha = 0.1
weight_latency = 0.8
weight_power = 0.1
weight_cost = 0.1

[capability_security]
audit_log_path = "/tmp/ank-audit.log"
max_issue_rate = 100

[intent_bus]
default_capacity = 1024
bridge_enabled = false
bridge_listen_addr = "127.0.0.1:9191"
bridge_connect_timeout_ms = 1000
bridge_request_timeout_ms = 5000
bridge_peers = []

[immune_system]
tcell_check_interval_ms = 5000
bcell_learning_interval_ms = 10000
macrophage_gc_interval_ms = 30000
max_anomaly_score = 10
quarantine_duration_secs = 300
rate_threshold = 100
deny_threshold = 5
kill_threshold = 15

[ebpf]
enable_fallback = false
tracepoint_program = "sys_enter_tp"

[lsm]
active_profile = "runtime"

[lsm.profiles.strict]
allowed_syscalls = ["read", "write", "recvmsg", "close"]

[lsm.profiles.runtime]
allowed_syscalls = [
  "read",
  "write",
  "recvmsg",
  "close",
  "poll",
  "mprotect",
