# =============================================================================
# AI-Native Kernel — Default Configuration
# =============================================================================
# This file defines all configurable parameters for the AI-Native Kernel
# companion daemon. Values are overridden by CLI args and environment variables
# (ANK_* prefix).

[general]
log_level = "info"

[kernel_companion]
uds_socket_path = "/tmp/ank-companion.sock"
intent_bus_capacity = 1024
monitoring_channel_capacity = 1024
metrics_server_addr = "127.0.0.1:9090"

[agent_scheduler]
max_agents = 100
max_restart_attempts = 3
supervisor_interval_ms = 100
next_agent_id_start = 1

[context_memory]
hot_capacity = 256
warm_capacity = 1024
enable_rocksdb = false

[compute_scheduler]
default_mode = "throughput"
adaptive_alpha = 0.1
weight_latency = 0.8
weight_power = 0.1
weight_cost = 0.1

[capability_security]
audit_log_path = "/tmp/ank-audit.log"

[intent_bus]
default_capacity = 1024

[immune_system]
tcell_check_interval_ms = 5000
bcell_learning_interval_ms = 10000
macrophage_gc_interval_ms = 30000
max_anomaly_score = 10
quarantine_duration_secs = 300

[ebpf]
enable_fallback = true
tracepoint_program = "sys_enter_tp"

[lsm]
active_profile = "runtime"

[lsm.profiles.strict]
allowed_syscalls = ["read", "write", "recvmsg", "close"]

[lsm.profiles.runtime]
allowed_syscalls = [
  "read",
  "write",
  "recvmsg",
  "close",
  "poll",
  "mprotect",
  "clone",
  "clone3",
  "futex",
