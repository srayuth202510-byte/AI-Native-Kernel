# =============================================================================
# AI-Native Kernel — Default Configuration
# =============================================================================
# This file defines all configurable parameters for the AI-Native Kernel
# companion daemon. Values are overridden by CLI args and environment variables
# (ANK_* prefix).

[general]
log_level = "info"

[kernel_companion]
uds_socket_path = "/tmp/ank-companion.sock"
intent_bus_capacity = 1024
monitoring_channel_capacity = 1024
metrics_server_addr = "127.0.0.1:9090"

[retry_telemetry]
retry_max_attempts = 3
retry_initial_backoff_ms = 100
retry_backoff_multiplier = 2.0
retry_max_backoff_ms = 10000
retry_timeout_ms = 5000
retry_use_jitter = true
metric_cache_ttl_ms = 300000
telemetry_snapshot_ttl_ms = 60000
audit_log_ttl_ms = 86400000
intent_metadata_ttl_ms = 300000
cleanup_interval_ms = 60000
telemetry_publish_interval_ms = 2000
include_timestamps = true
auto_cleanup = true

[agent_scheduler]
max_agents = 100
max_restart_attempts = 3
supervisor_interval_ms = 100
next_agent_id_start = 1
distributed_enabled = false
local_node_id = "node-local"
remote_overload_threshold_percent = 80
min_remote_trust_score = 70
max_remote_candidates = 3

[context_memory]
hot_capacity = 256
warm_capacity = 1024
p2p_enabled = false
p2p_listen_addr = "127.0.0.1:9091"
p2p_bootstrap_nodes = []
# pre-shared key (hex, อย่างน้อย 16 ไบต์ = 32 hex chars) สำหรับ mutual auth
# ของ P2P mesh (H6) — ทุก node ใน mesh เดียวกันต้องใช้ค่าเดียวกัน บังคับ
# เมื่อ p2p_enabled = true (ไม่ตั้ง = daemon fail closed ตอน boot)
# p2p_mesh_key_hex = "0123456789abcdef0123456789abcdef"
warm_store_path = "/tmp/ank-warm-store"
sfs_enabled = false
sfs_root_path = "/tmp/ank-sfs"
qdrant_url = "http://localhost:6334"

# Semantic Query Cache — แคชผลลัพธ์จากข้อคำถามภาษาธรรมชาติ
query_cache_enabled = true
query_cache_capacity = 4096
query_cache_ttl_ms = 300000
query_cache_similarity_threshold = 0.85

# Incremental Semantic Indexing — ดัชนีไฟล์เชิงความหมายแบบเพิ่มขึ้น
incremental_indexing_enabled = true
incremental_index_batch_window_ms = 500
incremental_index_max_batch_size = 50

[compute_scheduler]
# To run without mock fallbacks for compute engines, set env ANK_COMPUTE_MOCK_FALLBACK=false
default_mode = "throughput"
adaptive_alpha = 0.1
weight_latency = 0.8
weight_power = 0.1
weight_cost = 0.1

# GPU Memory Pool — จัดสรรหน่วยความจำ GPU (CUDA/ROCm)
gpu_pool_enabled = false
gpu_pool_platform = "cuda"               # "cuda" หรือ "rocm"
gpu_pool_capacity_mb = 8192              # ขนาด pool ใน MB
gpu_pool_real_mode = false               # true = ใช้ CUDA/ROCm FFI จริง

# GPU Budget Controller — งบประมาณ VRAM ต่อ Agent
gpu_budget_enabled = true
gpu_budget_default_mb = 1024             # ค่างบประมาณเริ่มต้นต่อ agent (MB)
gpu_budget_system_capacity_mb = 8192     # VRAM รวมของระบบ (MB)

# vLLM Engine — subprocess สำหรับ NVIDIA + AMD ROCm
vllm_enabled = false
vllm_endpoint = "http://127.0.0.1:8000"
vllm_model = "Qwen/Qwen2.5-7B-Instruct"
vllm_tensor_parallel_size = 1
vllm_gpu_memory_utilization = 0.85
vllm_max_model_len = 4096
vllm_dtype = "auto"
vllm_binary = "vllm"                    # path/command สำหรับ vLLM

# MPS Engine — Apple Silicon GPU (Metal Performance Shaders)
mps_enabled = false
mps_endpoint = "http://127.0.0.1:8080"  # llama.cpp HTTP endpoint

[capability_security]
audit_log_path = "/tmp/ank-audit.log"
max_issue_rate = 100

[intent_bus]
default_capacity = 1024
bridge_enabled = false
bridge_listen_addr = "127.0.0.1:9191"
bridge_connect_timeout_ms = 1000
bridge_request_timeout_ms = 5000
bridge_peers = []

[immune_system]
tcell_check_interval_ms = 5000
bcell_learning_interval_ms = 10000
macrophage_gc_interval_ms = 30000
max_anomaly_score = 10
quarantine_duration_secs = 300
rate_threshold = 100
deny_threshold = 5
kill_threshold = 15

[observability]
otel_endpoint = ""
otel_service_name = "ank-kernel-companion"
otel_export_timeout_ms = 10000
json_log_output = "stderr"

[ebpf]
enable_fallback = false
tracepoint_program = "sys_enter_tp"

[lsm]
active_profile = "runtime"
# cgroup (v2) ที่ใช้เป็น agent scope (Hardening H1) — เมื่อกำหนด daemon จะ
# สร้าง/ลงทะเบียน cgroup นี้ตอน boot และย้าย PID ที่ authorize ผ่านเข้าไป
# ทำให้ agent อยู่ใต้ default-DENY ระดับ kernel โดยไม่กระทบ process ของ host
# agent_cgroup_path = "/sys/fs/cgroup/ank-agents"

[lsm.profiles.strict]
allowed_syscalls = ["read", "write", "recvmsg", "close"]

[lsm.profiles.runtime]
