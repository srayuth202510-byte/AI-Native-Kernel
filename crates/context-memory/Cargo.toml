package = "context-memory"
edition = "2024"
rust-version = "1.72"
description = "AI Context Memory Manager - hot/warm/cold paging"
license = "MIT"
repository = "https://github.com/srayuth202510-byte/AI-Native-Kernel"
keywords = ["ai", "memory", "paging", "context"]

[dependencies]
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
thiserror = "1.0"
anyhow = "1.0"
rocksdb = { version = "0.21", features = ["snappy"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
"